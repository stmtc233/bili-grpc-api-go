syntax = "proto3";

package bilibili.relation.interface.v1;

service RelationInterface {
    // 评论区 At 用户列表 (无需登录鉴权)
    rpc AtSearch (AtSearchReq) returns (AtSearchReply);
    rpc ModifyRelation(FollowingReq) returns (ModifyRelationReply);
}

message AtSearchReq {
    // 可以为 1 , 但是不能为 0 或空 不知道有啥用
    int64 mid = 1;
    // 用户名搜索关键词
    string keyword = 2;
}

message AtSearchReply {
    // 搜索结果分组
    repeated AtGroup items = 1;
}

message AtGroup {
    // 分组类型  2: 我的关注 4:其他 ,其他自测
    int32 group_type = 1;
    // 分组名称
    string group_name = 2;
    // 用户列表
    repeated AtItem items = 3;
}

message AtItem {
  int64 mid = 1;
  string name = 2;
  string face = 3;
  int32 fans = 4;
  int32 official_verify_type = 5;
}


message FollowingReq {
  int64 fid = 1;
  Act act = 2;
  int32 source = 3;
  string spmid = 4;
  string extend_content = 5;
  string from_spmid = 6;
  string from_scmid = 7;
  string action_id = 8;
}

message ModifyRelationReply {}

enum Act {
  ACT_NA = 0;
  ACT_ADD_FOLLOWING = 1;
  ACT_DEL_FOLLOWING = 2;
  ACT_ADD_WHISPER = 3;
  ACT_DEL_WHISPER = 4;
  ACT_ADD_BLACK = 5;
  ACT_DEL_BLACK = 6;
  ACT_DEL_FOLLOWER = 7;
}



option go_package = "github.com/stmtc233/bili-grpc-api-go/bilibili/relation/interfaces";
