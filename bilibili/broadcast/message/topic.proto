syntax = "proto3";

package bilibili.broadcast.message.topic;

// 
message DetailEventMessage {
    // 
    int32 type = 1;
    // 
    repeated PubEvent pub_data = 2;
}

// 
message PubEvent {
    // 
    int64 dynamic_id = 1;
    // 
    int64 mid = 2;
}


option go_package = "github.com/stmtc233/bili-grpc-api-go/bilibili/broadcast/message";
